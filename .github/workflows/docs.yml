name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libicu-dev

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies (pkgdown, devtools)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: R-package
          extra-packages: any::pkgdown, any::devtools, any::cpp11

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python package and docs tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e py-package/
          python -m pip install mkdocs-material "mkdocstrings[python]"

      - name: Build documentation (Makefile)
        run: make docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4