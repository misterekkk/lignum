name: Deploy Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  docs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: R-package
          extra-packages: any::pkgdown, any::brio, any::decor, any::desc, any::glue, any::tibble, any::vctrs

      - name: Prepare C++ source
        shell: Rscript {0}
        run: |
          if (!dir.exists("R-package/inst/include")) dir.create("R-package/inst/include", recursive = TRUE)
          if (!dir.exists("R-package/src")) dir.create("R-package/src", recursive = TRUE)
          
          file.copy(list.files("include", full.names = TRUE), "R-package/inst/include", overwrite = TRUE)
          if (file.exists("extern/simdjson/simdjson.h")) {
            file.copy("extern/simdjson/simdjson.h", "R-package/inst/include", overwrite = TRUE)
          }
          
          file.copy(list.files("src_core", pattern = "\\.cpp$", full.names = TRUE), "R-package/src", overwrite = TRUE)
          file.copy(list.files("src_core", pattern = "\\.hpp$", full.names = TRUE), "R-package/inst/include", overwrite = TRUE)
          if (file.exists("extern/simdjson/simdjson.cpp")) {
            file.copy("extern/simdjson/simdjson.cpp", "R-package/src", overwrite = TRUE)
          }
          
          setwd("R-package")
          cpp11::cpp_register(".")

      - name: Install local R package
        run: R CMD INSTALL R-package

      - name: Build Documentation
        run: make docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ github.workspace }}/site"

      - uses: actions/deploy-pages@v4