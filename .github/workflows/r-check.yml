name: R package check

on:
  push:
    paths:
      - 'R-package/**'
      - 'src_core/**'
      - 'include/**'
      - '.github/workflows/r-check.yml'
  pull_request:
    paths:
      - 'R-package/**'
      - 'src_core/**'
      - 'include/**'

jobs:
  test:
    name: Check on ${{ matrix.config.os }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest}
          - {os: windows-latest}
          
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: R-package
          extra-packages: any::rcmdcheck, any::tinytest, any::brio, any::decor, any::desc, any::glue, any::tibble, any::vctrs

      - name: Prepare C++ source
        shell: Rscript {0}
        run: |
          if (!dir.exists("R-package/inst/include")) dir.create("R-package/inst/include", recursive = TRUE)
          if (!dir.exists("R-package/src")) dir.create("R-package/src", recursive = TRUE)
          
          file.copy(list.files("include", full.names = TRUE), "R-package/inst/include", overwrite = TRUE)
          if (file.exists("extern/simdjson/simdjson.h")) {
            file.copy("extern/simdjson/simdjson.h", "R-package/inst/include", overwrite = TRUE)
          }
          
          file.copy(list.files("src_core", full.names = TRUE), "R-package/src", overwrite = TRUE)
          if (file.exists("extern/simdjson/simdjson.cpp")) {
            file.copy("extern/simdjson/simdjson.cpp", "R-package/src", overwrite = TRUE)
          }
          
          setwd("R-package")
          cpp11::cpp_register(".")

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: R-package
          args: 'c("--as-cran")'
          error-on: '"error"'